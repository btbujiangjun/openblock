<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 640" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4a9eff"/>
    </marker>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,0 L5,10 Z" fill="rgba(255,255,255,0.4)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="640" fill="#060810" rx="8"/>

  <!-- Title -->
  <text x="420" y="26" fill="#e8a0c8" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" letter-spacing="1">SpawnPolicyNet V3.1  —  ~317K Parameters</text>

  <!-- ═══ INPUT TOKENS ═══ -->
  <rect x="15" y="36" width="810" height="58" rx="8" fill="rgba(74,158,255,0.05)" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>
  <text x="35" y="52" fill="rgba(255,255,255,0.4)" font-family="Arial" font-size="10" font-weight="bold">INPUT  —  5 Sources → 13 Token Sequence</text>

  <rect x="25" y="58" width="120" height="28" rx="4" fill="#3a1a1a" stroke="#8a3a3a" stroke-width="0.8"/>
  <text x="85" y="74" fill="#e57373" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">CLS (learnable)</text>
  <text x="85" y="84" fill="#8a4a4a" font-size="7" text-anchor="middle">128-dim param</text>

  <rect x="155" y="58" width="150" height="28" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="0.8"/>
  <text x="230" y="74" fill="#7eb8ff" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">state</text>
  <text x="230" y="84" fill="#4a6a9a" font-size="7" text-anchor="middle">board(64)+ctx(72)→128</text>

  <rect x="315" y="58" width="120" height="28" rx="4" fill="#2a1a0d" stroke="#8a5a2d" stroke-width="0.8"/>
  <text x="375" y="74" fill="#ffb74d" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">difficulty</text>
  <text x="375" y="84" fill="#8a6a3a" font-size="7" text-anchor="middle">d∈[0,1] → 128</text>

  <rect x="445" y="58" width="120" height="28" rx="4" fill="#2a1a3a" stroke="#6a3a8a" stroke-width="0.8"/>
  <text x="505" y="74" fill="#ba68c8" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">playstyle</text>
  <text x="505" y="84" fill="#7a4a9a" font-size="7" text-anchor="middle">Embed(5→128)</text>

  <rect x="575" y="58" width="230" height="28" rx="4" fill="#1a3a1a" stroke="#3a7a3a" stroke-width="0.8"/>
  <text x="690" y="74" fill="#81c784" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">history (9 tokens)</text>
  <text x="690" y="84" fill="#4a6a3a" font-size="7" text-anchor="middle">Embed(29×128)+pos_embed</text>

  <!-- Arrow to sequence -->
  <line x1="420" y1="94" x2="420" y2="110" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══ TOKEN SEQUENCE ═══ -->
  <rect x="15" y="112" width="810" height="36" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="420" y="134" fill="rgba(255,255,255,0.5)" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">TOKEN SEQUENCE:  [CLS | state | diff | style | h₀ | h₁ | h₂ | ... | h₈]  ∈  R^{B × 13 × 128}</text>

  <!-- Arrow to encoder -->
  <line x1="420" y1="148" x2="420" y2="164" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ═══ TRANSFORMER ENCODER ═══ -->
  <rect x="15" y="166" width="810" height="130" rx="8" fill="rgba(255,183,77,0.05)" stroke="rgba(255,183,77,0.15)" stroke-width="1.5"/>
  <text x="420" y="184" fill="#ffb74d" font-family="Arial" font-size="12" text-anchor="middle" font-weight="bold">TRANSFORMER ENCODER  —  6 Layers</text>

  <!-- Layer detail -->
  <rect x="30" y="192" width="780" height="48" rx="5" fill="rgba(255,183,77,0.06)" stroke="rgba(255,183,77,0.15)" stroke-width="0.8"/>
  <text x="420" y="210" fill="#e0c090" font-family="Courier New" font-size="10" text-anchor="middle">For each of 6 layers:</text>

  <rect x="40" y="218" width="360" height="22" rx="3" fill="#2a1a0d" stroke="rgba(255,183,77,0.2)" stroke-width="0.8"/>
  <text x="220" y="234" fill="#d0a060" font-family="Courier New" font-size="9" text-anchor="middle">Multi-Head Self-Attn (4 heads, d=128, Pre-LN)</text>

  <rect x="420" y="218" width="370" height="22" rx="3" fill="#2a1a0d" stroke="rgba(255,183,77,0.2)" stroke-width="0.8"/>
  <text x="605" y="234" fill="#d0a060" font-family="Courier New" font-size="9" text-anchor="middle">FFN: 128 → 256 → GELU → 128 (dropout=0.1)</text>

  <text x="405" y="256" fill="rgba(255,183,77,0.3)" font-family="Arial" font-size="9" text-anchor="middle">↑ Pre-LN  ·  Residual connection after each sub-layer  ·  ×6 stacked</text>
  <text x="710" y="272" fill="rgba(255,183,77,0.15)" font-size="8" text-anchor="middle">×6</text>

  <!-- Arrow to CLS -->
  <line x1="420" y1="296" x2="420" y2="312" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- CLS output -->
  <rect x="200" y="314" width="440" height="28" rx="4" fill="rgba(186,104,200,0.08)" stroke="rgba(186,104,200,0.2)" stroke-width="1"/>
  <text x="420" y="332" fill="#ba68c8" font-family="Courier New" font-size="11" text-anchor="middle" font-weight="bold">CLS output: h_c ∈ R^{B × 128}</text>

  <!-- Branch arrows -->
  <line x1="280" y1="342" x2="280" y2="360" stroke="rgba(255,255,255,0.25)" stroke-width="1" marker-end="url(#arrowDown)"/>
  <line x1="560" y1="342" x2="560" y2="360" stroke="rgba(255,255,255,0.25)" stroke-width="1" marker-end="url(#arrowDown)"/>

  <!-- ═══ LEFT: SLOT HEADS ═══ -->
  <rect x="40" y="362" width="380" height="125" rx="8" fill="rgba(129,199,132,0.04)" stroke="rgba(129,199,132,0.12)" stroke-width="1"/>
  <text x="230" y="380" fill="#81c784" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">SLOT HEADS (Autoregressive)</text>

  <rect x="50" y="390" width="110" height="32" rx="4" fill="#1a3d2a" stroke="#3a7a4a" stroke-width="0.8"/>
  <text x="105" y="404" fill="#81c784" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">head₀</text>
  <text x="105" y="418" fill="#4a7a5a" font-size="7" text-anchor="middle">128→64→28</text>

  <text x="168" y="408" fill="rgba(255,255,255,0.3)" font-size="12">→</text>

  <rect x="182" y="390" width="110" height="32" rx="4" fill="#1a3d2a" stroke="#3a7a4a" stroke-width="0.8"/>
  <text x="237" y="404" fill="#81c784" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">head₁</text>
  <text x="237" y="418" fill="#4a7a5a" font-size="7" text-anchor="middle">256→64→28</text>

  <text x="300" y="408" fill="rgba(255,255,255,0.3)" font-size="12">→</text>

  <rect x="314" y="390" width="96" height="32" rx="4" fill="#1a3d2a" stroke="#3a7a4a" stroke-width="0.8"/>
  <text x="362" y="404" fill="#81c784" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">head₂</text>
  <text x="362" y="418" fill="#4a7a5a" font-size="7" text-anchor="middle">384→64→28</text>

  <text x="105" y="440" fill="#4a7a5a" font-family="Arial" font-size="8" text-anchor="middle">P(s₁|ctx)</text>
  <text x="237" y="440" fill="#4a7a5a" font-family="Arial" font-size="8" text-anchor="middle">P(s₂|s₁,ctx)</text>
  <text x="362" y="440" fill="#4a7a5a" font-family="Arial" font-size="8" text-anchor="middle">P(s₃|s₁,s₂,ctx)</text>

  <text x="230" y="462" fill="rgba(255,255,255,0.15)" font-size="8" text-anchor="middle">Training: teacher-forcing  ·  Inference: autoregressive sampling</text>
  <text x="230" y="478" fill="rgba(255,255,255,0.12)" font-size="7" text-anchor="middle">Joint density: P(s₁,s₂,s₃|ctx) = P(s₁)·P(s₂|s₁)·P(s₃|s₁,s₂)</text>

  <!-- ═══ RIGHT: AUX HEADS ═══ -->
  <rect x="440" y="362" width="385" height="125" rx="8" fill="rgba(186,104,200,0.04)" stroke="rgba(186,104,200,0.12)" stroke-width="1"/>
  <text x="632" y="380" fill="#ba68c8" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">AUXILIARY HEADS (from h_c)</text>

  <rect x="450" y="390" width="110" height="22" rx="3" fill="#1a1033" stroke="#6a4a8a" stroke-width="0.8"/>
  <text x="505" y="405" fill="#b090d0" font-family="Courier New" font-size="8" text-anchor="middle">diversity 128→21</text>

  <rect x="570" y="390" width="110" height="22" rx="3" fill="#1a1033" stroke="#6a4a8a" stroke-width="0.8"/>
  <text x="625" y="405" fill="#b090d0" font-family="Courier New" font-size="8" text-anchor="middle">difficulty 128→1</text>

  <rect x="690" y="390" width="120" height="22" rx="3" fill="#1a1033" stroke="#6a4a8a" stroke-width="0.8"/>
  <text x="750" y="405" fill="#b090d0" font-family="Courier New" font-size="8" text-anchor="middle">feasibility 128→28</text>

  <rect x="450" y="420" width="110" height="22" rx="3" fill="#1a1033" stroke="#6a4a8a" stroke-width="0.8"/>
  <text x="505" y="435" fill="#b090d0" font-family="Courier New" font-size="8" text-anchor="middle">style 128→5</text>

  <rect x="570" y="420" width="110" height="22" rx="3" fill="#1a1033" stroke="#6a4a8a" stroke-width="0.8"/>
  <text x="625" y="435" fill="#b090d0" font-family="Courier New" font-size="8" text-anchor="middle">intent 128→7</text>

  <text x="632" y="462" fill="rgba(255,255,255,0.15)" font-size="8" text-anchor="middle">5 auxiliary heads: multi-task regularization</text>
  <text x="632" y="478" fill="rgba(255,255,255,0.12)" font-size="7" text-anchor="middle">Style + Intent: self-supervised learning</text>

  <!-- ═══ LoRA ═══ -->
  <rect x="15" y="500" width="810" height="45" rx="8" fill="rgba(229,115,115,0.04)" stroke="rgba(229,115,115,0.12)" stroke-width="1"/>
  <text x="420" y="518" fill="#e57373" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">LoRA PERSONALIZATION  —  W = W₀ + (α/r)·BA  ·  r=4, α=16</text>
  <text x="420" y="536" fill="rgba(255,255,255,0.25)" font-family="Arial" font-size="9" text-anchor="middle">Injected at self_attn.q_proj + v_proj + dim_feedforward  ·  5.6K params/player (~1.8%)  ·  Switch ~30ms</text>

  <!-- ═══ TRAINING + METRICS ═══ -->
  <rect x="15" y="555" width="810" height="78" rx="8" fill="rgba(74,158,255,0.03)" stroke="rgba(74,158,255,0.08)" stroke-width="1"/>
  <text x="420" y="573" fill="#7eb8ff" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">TRAINING &amp; INFERENCE</text>

  <rect x="25" y="582" width="260" height="42" rx="4" fill="rgba(129,199,132,0.04)" stroke="rgba(129,199,132,0.08)" stroke-width="0.8"/>
  <text x="155" y="598" fill="#81c784" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">V3.1 Loss (8 terms)</text>
  <text x="155" y="616" fill="#5a8a6a" font-size="7" text-anchor="middle">ceAR(1.0)+div(0.3)+anti(0.5)+diff(0.1)+feas(0.4)+soft(0.2)+style(0.15)+intent(0.10)</text>

  <rect x="300" y="582" width="260" height="42" rx="4" fill="rgba(74,158,255,0.04)" stroke="rgba(74,158,255,0.08)" stroke-width="0.8"/>
  <text x="430" y="598" fill="#7eb8ff" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">Training Data</text>
  <text x="430" y="616" fill="#4a6a9a" font-size="7" text-anchor="middle">Player replays · Rule-engine synthetic · Self-play · Offline distillation</text>

  <rect x="575" y="582" width="240" height="42" rx="4" fill="rgba(255,183,77,0.04)" stroke="rgba(255,183,77,0.08)" stroke-width="0.8"/>
  <text x="695" y="598" fill="#ffb74d" font-family="Arial" font-size="9" text-anchor="middle" font-weight="bold">Inference</text>
  <text x="695" y="616" fill="#8a6a3a" font-size="7" text-anchor="middle">4-8ms CPU · Constraint gate · Auto fallback to rules</text>
</svg>