# Alembic configuration for OpenBlock services.
#
# Run from repo root:
#   alembic -c services/alembic.ini upgrade head
#   alembic -c services/alembic.ini revision --autogenerate -m "describe"
#
# DATABASE_URL env overrides `sqlalchemy.url`. CI uses sqlite in-memory.

[alembic]
script_location = services/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///services/_alembic_dev.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
