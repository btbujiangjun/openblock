version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openblock-postgres
    environment:
      POSTGRES_DB: openblock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openblock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user
    container_name: openblock-user
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: openblock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8001
      USE_POSTGRES: "true"
      USE_REDIS: "true"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Game Service
  game-service:
    build:
      context: .
      dockerfile: Dockerfile.game
    container_name: openblock-game
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: openblock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8002
      USE_POSTGRES: "true"
      USE_REDIS: "true"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: openblock-analytics
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: openblock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8003
      USE_POSTGRES: "true"
      USE_REDIS: "true"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Monitoring Service
  monitoring-service:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    container_name: openblock-monitoring
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 8004
    ports:
      - "8004:8004"

  # API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: openblock-gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - game-service
      - analytics-service
      - monitoring-service

volumes:
  postgres_data:
  redis_data: