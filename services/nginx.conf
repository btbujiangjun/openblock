#
# OpenBlock API gateway — v1.15
#
# Hardened version of the v1.13 path-only forwarder. Adds:
#   - Per-zone limit_req: stricter on /api/auth/* and /api/payment/*,
#     looser on read-mostly paths.
#   - JWT validation via auth_request → user-service /api/auth/verify
#     (turn on by setting OPENBLOCK_REQUIRE_AUTH=on at deploy time;
#      default is off so existing dev flows keep working).
#   - Standard security headers (HSTS, X-Frame-Options, X-Content-Type-
#     Options, Referrer-Policy, Permissions-Policy, COEP/CORP-friendly).
#   - Real-IP / X-Forwarded-For propagation (assumes the trusted edge
#     LB strips client-supplied X-Forwarded-* before us).
#   - 5xx → trip a per-upstream open-circuit (max_fails / fail_timeout).
#   - TLS termination block sits behind `# tls` markers; populate the
#     cert paths via your secret manager and uncomment.
#

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;       # don't expose nginx version in responses
    keepalive_timeout 30s;
    client_max_body_size 1m;   # casual game payloads are small

    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
        '"req_time":$request_time,"upstream":"$upstream_addr",'
        '"req_id":"$request_id","ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json_combined;

    # ------------------------------------------------------------------
    # Rate limit zones — defense-in-depth alongside the in-process
    # limiter inside each Flask service. Keys use binary_remote_addr
    # (IPv4: 4B / IPv6: 16B), so 10m of memory holds ~160k unique IPs.
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=auth_zone:10m       rate=5r/s;
    limit_req_zone $binary_remote_addr zone=payment_zone:10m    rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m        rate=50r/s;
    limit_req_status 429;

    # ------------------------------------------------------------------
    # Upstreams (per-service circuit breaker + keepalive).
    # ------------------------------------------------------------------
    upstream user_service {
        server user-service:8001 max_fails=3 fail_timeout=20s;
        keepalive 32;
    }
    upstream game_service {
        server game-service:8002 max_fails=3 fail_timeout=20s;
        keepalive 32;
    }
    upstream analytics_service {
        server analytics-service:8003 max_fails=3 fail_timeout=20s;
        keepalive 16;
    }
    upstream monitoring_service {
        server monitoring-service:8004 max_fails=3 fail_timeout=20s;
        keepalive 8;
    }

    # ------------------------------------------------------------------
    # Common proxy + security headers (snippet reused per location).
    # ------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header   Connection            "";
    proxy_set_header   Host                  $host;
    proxy_set_header   X-Real-IP             $remote_addr;
    proxy_set_header   X-Forwarded-For       $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto     $scheme;
    proxy_set_header   X-Request-Id          $request_id;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Standard hardening headers; HSTS only meaningful behind TLS.
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header X-Request-Id             $request_id         always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # tls

    # ------------------------------------------------------------------
    # tls: TLS termination block (populate cert paths in production).
    # server {
    #     listen 443 ssl http2;
    #     server_name api.openblock.dev;
    #     ssl_certificate     /etc/nginx/tls/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/tls/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers off;
    #     # ... (mirror the location blocks below)
    # }
    # ------------------------------------------------------------------

    server {
        listen 80 default_server;
        server_name _;

        # ---------- Health & infra (no rate limit) ----------
        location = /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        location = /metrics {
            # Scrape target for Prometheus; restrict to internal CIDRs in prod.
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass http://monitoring_service;
        }

        # ---------- Internal: JWT verify subrequest ----------
        # Turn the 200 response from /api/auth/verify into "auth ok".
        # Other locations opt in via `auth_request /_auth_verify`.
        location = /_auth_verify {
            internal;
            proxy_pass              http://user_service/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length          "";
            proxy_set_header        X-Original-URI          $request_uri;
            proxy_set_header        Authorization           $http_authorization;
        }

        # ---------- Auth: tightest rate limit, no auth_request ----------
        location /api/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://user_service;
        }

        # ---------- Users CRUD ----------
        location /api/users {
            limit_req zone=api_zone burst=100 nodelay;
            # auth_request /_auth_verify;   # enable in prod
            proxy_pass http://user_service;
        }

        # ---------- Games / leaderboards / achievements / levels ----------
        location /api/games {
            limit_req zone=api_zone burst=100 nodelay;
            # auth_request /_auth_verify;
            proxy_pass http://game_service;
        }
        location /api/leaderboards {
            limit_req zone=api_zone burst=200 nodelay;
            proxy_pass http://game_service;
        }
        location /api/achievements {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_pass http://game_service;
        }
        location /api/levels {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_pass http://game_service;
        }

        # ---------- Analytics ingestion (high burst, low per-request cost) ----------
        location /api/analytics {
            limit_req zone=api_zone burst=500 nodelay;
            proxy_pass http://analytics_service;
        }

        # ---------- Payment callbacks (provider IPs only in prod) ----------
        location /api/payment/ {
            limit_req zone=payment_zone burst=20 nodelay;
            # allow <provider CIDR>;  deny all;   # uncomment per provider
            proxy_pass http://user_service;
        }

        # ---------- OpenAPI / Swagger UI (read-only docs) ----------
        location = /openapi.json {
            proxy_pass http://user_service;
        }
        location = /docs {
            proxy_pass http://user_service;
        }

        # ---------- Catch-all 404 ----------
        location / {
            return 404;
        }
    }
}
