<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBlock 文档中心</title>

  <!-- API base URL：通过 meta 注入，无 meta 时自动探测 -->
  <meta name="api-base" content="" />

  <!-- marked.js — Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- highlight.js — 代码语法高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
  <!-- KaTeX — 数学公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid — 流程图 / 架构图 / 时序图渲染 -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { htmlLabels: true, useMaxWidth: true, curve: 'basis' },
      sequence: { useMaxWidth: true },
      themeVariables: { fontFamily: 'inherit', fontSize: '14px' }
    });
    // ELK 布局加载器：嵌套 subgraph 的 `direction LR` dagre 默认实现不可靠，
    // 需要 ELK 才能正确渲染分层架构图（架构总览图通过 `config: layout: elk` 启用）。
    // 优先 esm.sh（动态 import 在跨域时最稳），失败再退 jsdelivr `+esm`，
    // 都失败时静默回退 dagre，不阻塞其他图。
    const ELK_SOURCES = [
      'https://esm.sh/@mermaid-js/layout-elk@0.2',
      'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0.2/+esm',
    ];
    let elkRegistered = false;
    for (const src of ELK_SOURCES) {
      try {
        const elkMod = await import(src);
        if (elkMod && elkMod.default && typeof mermaid.registerLayoutLoaders === 'function') {
          mermaid.registerLayoutLoaders(elkMod.default);
          elkRegistered = true;
          console.log('[mermaid] ELK 布局已注册 ←', src);
          break;
        }
      } catch (e) {
        console.warn('[mermaid] ELK 加载失败 ←', src, '|', e && e.message ? e.message : e);
      }
    }
    if (!elkRegistered) {
      console.warn('[mermaid] ELK 布局全部源不可用，已回退默认 dagre 渲染器');
    }
    window.mermaid = mermaid;
    window._mermaidElkReady = elkRegistered;
  </script>

  <style>
    /* ─── CSS 变量 ─── */
    :root {
      --bg:        #f5f7fa;
      --sidebar-bg:#ffffff;
      --content-bg:#ffffff;
      --border:    #e2e8f0;
      --accent:    #3b82f6;
      --accent-h:  #2563eb;
      --text:      #1e293b;
      --text-muted:#64748b;
      --active-bg: #eff6ff;
      --active-border: #3b82f6;
      --cat-color: #94a3b8;
      --code-bg:   #f8fafc;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
      --radius:    8px;
      --sidebar-w: 260px;
      --header-h:  52px;
    }

    /* ─── 重置 ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ─── 顶部导航栏 ─── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      box-shadow: var(--shadow);
    }
    .header-logo {
      font-size: 16px; font-weight: 700; color: var(--accent);
      text-decoration: none; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .header-logo span { font-size: 20px; }
    .header-search {
      flex: 1; max-width: 320px;
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
    }
    .header-search svg { flex-shrink: 0; color: var(--text-muted); }
    .header-search input {
      border: none; background: transparent; outline: none;
      font-size: 13px; color: var(--text); width: 100%;
    }
    .header-search input::placeholder { color: var(--text-muted); }
    .header-stats {
      margin-left: auto; font-size: 12px; color: var(--text-muted);
      white-space: nowrap;
    }
    .header-game-link {
      font-size: 12px; color: var(--accent); text-decoration: none;
      padding: 5px 12px; border: 1px solid var(--accent);
      border-radius: 14px; white-space: nowrap;
      transition: background .15s;
    }
    .header-game-link:hover { background: var(--active-bg); }

    /* ─── 布局 ─── */
    .layout {
      display: flex;
      min-height: 100vh;
      padding-top: var(--header-h);
    }

    /* ─── 侧边栏 ─── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: fixed;
      top: var(--header-h);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 12px 0 24px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cat-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 10px 10px 3px;
      padding: 5px 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border-left: 3px solid var(--accent);
      border-radius: 0 5px 5px 0;
    }
    .cat-title::before {
      content: '';
      display: none;
    }
    .doc-link {
      display: block;
      padding: 6px 16px 6px 24px;
      font-size: 12.5px; color: var(--text-muted);
      text-decoration: none; cursor: pointer;
      border-left: 2px solid transparent;
      transition: color .12s, background .12s, border-color .12s;
      line-height: 1.4; word-break: break-all;
      white-space: normal;
    }
    .doc-link:hover { color: var(--text); background: var(--bg); }
    .doc-link.active {
      color: var(--accent); background: var(--active-bg);
      border-left-color: var(--active-border);
      font-weight: 500;
    }
    .doc-link.hidden { display: none; }
    .doc-subtitle {
      margin: 8px 14px 3px 24px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--text-muted);
    }

    /* ─── 主内容区 ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; min-width: 0;
      padding: 32px 40px 60px;
      max-width: 900px;
    }

    /* ─── 欢迎首页 ─── */
    .welcome {
      padding: 32px 0;
    }
    .welcome h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { color: var(--text-muted); line-height: 1.7; margin-bottom: 24px; }
    .welcome-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .welcome-card {
      padding: 14px 16px;
      background: var(--content-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .welcome-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(59,130,246,.12); }
    .welcome-card .cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 6px; }
    .welcome-card .title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }

    /* ─── Markdown 内容渲染 ─── */
    .md-body {
      line-height: 1.75;
    }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-weight: 600; margin: 1.6em 0 .6em; line-height: 1.3;
    }
    .md-body h1 { font-size: 1.8em; border-bottom: 2px solid var(--border); padding-bottom: .4em; }
    .md-body h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    .md-body h3 { font-size: 1.1em; }
    .md-body h4 { font-size: 1em; color: var(--text-muted); }
    .md-body p { margin: .8em 0; }
    .md-body ul, .md-body ol { padding-left: 1.6em; margin: .8em 0; }
    .md-body li { margin: .3em 0; }
    .md-body li > ul, .md-body li > ol { margin: .2em 0; }
    .md-body blockquote {
      border-left: 3px solid var(--accent); margin: 1em 0;
      padding: .6em 1em; background: var(--active-bg);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }
    .md-body code {
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, Monaco, monospace;
      font-size: .86em; background: var(--code-bg);
      padding: .15em .4em; border-radius: 4px;
      border: 1px solid var(--border); color: #c0392b;
    }
    .md-body pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: var(--radius); overflow-x: auto;
      margin: 1em 0; padding: 1em 1.2em;
    }
    .md-body pre code {
      background: transparent; border: none; color: inherit;
      padding: 0; font-size: .85em;
    }
    .md-body table {
      border-collapse: collapse; width: 100%; margin: 1em 0;
      font-size: .9em;
    }
    .md-body th, .md-body td {
      border: 1px solid var(--border); padding: 7px 12px; text-align: left;
    }
    .md-body th { background: var(--bg); font-weight: 600; }
    .md-body tr:nth-child(even) td { background: #fafbfc; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    .md-body img { max-width: 100%; border-radius: var(--radius); }
    /* KaTeX 公式样式微调 */
    .md-body .katex-display { overflow-x: auto; overflow-y: hidden; padding: .2em 0; }
    .md-body .katex { font-size: 1.05em; }
    /* 公式等待 KaTeX 就绪时的占位样式 */
    .katex-pending { display: inline-block; color: var(--text-muted); font-style: italic; font-size: .9em; }
    .katex-pending::before { content: attr(data-formula); }

    /* ─── Mermaid 图样式 ─── */
    .md-body .mermaid {
      display: block;
      text-align: center;
      margin: 16px 0;
      background: var(--code-bg);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    .md-body .mermaid svg { max-width: 100%; height: auto; }
    /* 等待 mermaid 就绪时不显示原始源码（轮询完成会替换为 .mermaid 容器） */
    .md-body .mermaid-pending {
      display: block;
      min-height: 60px;
      background: var(--code-bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: transparent;
      font-size: 0;
      line-height: 0;
      position: relative;
    }
    .md-body .mermaid-pending::after {
      content: '正在渲染图表…';
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .md-body .mermaid-error {
      color: #c0392b;
      background: #fff5f5;
      border: 1px solid #f3c1c1;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }

    /* ─── 加载 / 错误 ─── */
    .status-msg {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px; color: var(--text-muted); font-size: 14px;
      flex-direction: column; gap: 10px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 文档导航面包屑 ─── */
    .breadcrumb {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb svg { color: var(--text-muted); }

    /* ─── 顶部回到首页按钮 ─── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--accent); cursor: pointer;
      margin-bottom: 16px; text-decoration: none;
    }
    .back-btn:hover { text-decoration: underline; }

    /* ─── 图片 / Mermaid 点击放大（Lightbox） ─── */
    .md-body img.zoomable,
    .md-body .mermaid svg { cursor: zoom-in; transition: filter .15s; }
    .md-body img.zoomable:hover,
    .md-body .mermaid:hover svg { filter: brightness(1.05) drop-shadow(0 2px 8px rgba(0,0,0,.08)); }
    /* ─── 图片加载失败占位条（onerror 自愈仍失败时显示）─── */
    .md-body .img-load-error {
      display: flex; flex-direction: column; gap: 6px;
      padding: 12px 16px; margin: 12px 0;
      border: 1px dashed #f97316; border-radius: 8px;
      background: #fff7ed; color: #9a3412; font-size: 14px;
    }
    .md-body .img-load-error strong { color: #c2410c; }
    .md-body .img-load-error a { color: #1d4ed8; text-decoration: underline; word-break: break-all; }
    .md-body .img-load-error .ile-url {
      font-size: 12px; color: #57534e; background: #fef3c7; padding: 4px 8px;
      border-radius: 4px; word-break: break-all; cursor: copy; user-select: all;
    }
    .md-body .img-load-error .ile-meta { font-size: 12px; color: #78716c; }
    .md-body .img-load-error .ile-meta code {
      background: #fef3c7; padding: 1px 6px; border-radius: 3px;
    }
    .md-body .img-load-error .ile-actions { display: flex; gap: 8px; margin-top: 4px; }
    .md-body .img-load-error .ile-diag {
      cursor: pointer; padding: 4px 12px; font-size: 12px;
      border: 1px solid #f97316; background: #fff7ed; color: #c2410c;
      border-radius: 4px; font-family: inherit;
    }
    .md-body .img-load-error .ile-diag:hover { background: #fed7aa; }
    .md-body .img-load-error .ile-diag-out {
      font-size: 11px; line-height: 1.5; padding: 8px 12px; margin: 4px 0 0 0;
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 4px;
      color: #44403c; white-space: pre-wrap; word-break: break-all;
      max-height: 240px; overflow: auto;
    }
    .lightbox {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(15, 17, 23, .92);
      display: none;
      flex-direction: column;
      backdrop-filter: blur(2px);
      animation: lb-fade .15s ease-out;
    }
    .lightbox.open { display: flex; }
    @keyframes lb-fade { from { opacity: 0; } to { opacity: 1; } }
    .lightbox-toolbar {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, .35);
      color: #fff;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }
    .lightbox-title {
      flex: 1 1 auto; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #d0d4dc;
    }
    .lightbox-zoom {
      flex: 0 0 auto;
      color: #9aa3b2; font-variant-numeric: tabular-nums;
      min-width: 56px; text-align: right;
    }
    .lightbox-btn {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 32px; height: 32px; padding: 0 10px;
      background: rgba(255, 255, 255, .08);
      color: #fff; border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 6px; cursor: pointer; text-decoration: none;
      font-size: 13px; line-height: 1;
      transition: background .12s, border-color .12s;
    }
    .lightbox-btn:hover { background: rgba(255, 255, 255, .18); border-color: rgba(255, 255, 255, .3); }
    .lightbox-btn[data-action="close"] { background: rgba(220, 60, 60, .25); border-color: rgba(220, 60, 60, .5); }
    .lightbox-btn[data-action="close"]:hover { background: rgba(220, 60, 60, .45); }
    .lightbox-stage {
      flex: 1 1 auto;
      overflow: auto;
      padding: 16px;
      cursor: grab;
      /* 用 grid 居中而非 flex：grid 的 place-items 在子元素超过容器时仍能正确滚动到全部内容 */
      display: grid;
      place-items: center;
    }
    .lightbox-stage.is-panning { cursor: grabbing; }
    .lightbox-canvas {
      display: inline-block;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .4);
      user-select: none;
      -webkit-user-drag: none;
      line-height: 0; /* 消除 inline 元素行高造成的底部空隙 */
    }
    .lightbox-canvas img,
    .lightbox-canvas svg { display: block; max-width: none; height: auto; }
    @media (max-width: 600px) {
      .lightbox-toolbar { flex-wrap: wrap; padding: 8px 10px; gap: 4px; }
      .lightbox-title { flex: 1 0 100%; order: -1; margin-bottom: 4px; }
      .lightbox-btn { min-width: 28px; height: 28px; padding: 0 6px; font-size: 12px; }
    }

    /* ─── 响应式 ─── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 220px; }
      .main { padding: 20px 16px 40px; }
    }
    @media (max-width: 600px) {
      .sidebar { transform: translateX(-100%); transition: transform .2s; }
      .sidebar.open { transform: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- 顶部导航栏 -->
<header>
  <a class="header-logo" href="#" id="logo-home">
    <span>📚</span> OpenBlock 文档
  </a>
  <div class="header-search">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="6.5" cy="6.5" r="5"/><line x1="11" y1="11" x2="14" y2="14"/>
    </svg>
    <input id="search-input" type="text" placeholder="搜索文档…" autocomplete="off" />
  </div>
  <span class="header-stats" id="doc-count"></span>
  <a class="header-game-link" href="/" target="_blank">← 游戏</a>
</header>

<!-- 主布局 -->
<div class="layout">
  <!-- 侧边栏 -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- 主内容 -->
  <main class="main" id="main">
    <div class="status-msg"><div class="spinner"></div><span>加载文档列表…</span></div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ─── API base URL ───
  // 始终使用相对路径（空字符串），让请求走当前 origin：
  //   · Vite dev server（3000）→ vite.config.js proxy → Flask（5000）
  //   · Flask 直接访问（5000） → Flask 自身路由
  //   · 如需跨域，通过 <meta name="api-base"> 注入绝对地址
  const API_BASE = (document.querySelector('meta[name="api-base"]') || {}).content || '';

  // ─── marked 配置（只用 renderer 做代码高亮，链接/标题通过 DOM 后处理）───
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });

    const renderer = new marked.Renderer();
    renderer.code = function (code, lang) {
      const codeStr = typeof code === 'object' ? (code.text || '') : (code || '');
      const langStr = typeof code === 'object' ? (code.lang || lang || '') : (lang || '');
      // Mermaid 块：emit 占位符，DOM 插入后由 renderPendingMermaid 异步渲染。
      // 源码做 HTML 实体转义，innerHTML 后通过 textContent 还原回 Mermaid 原文。
      if (langStr === 'mermaid') {
        const esc = codeStr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="mermaid-pending">${esc}</div>`;
      }
      if (typeof hljs !== 'undefined' && langStr && hljs.getLanguage(langStr)) {
        try {
          const hl = hljs.highlight(codeStr, { language: langStr }).value;
          return `<pre><code class="hljs language-${langStr}">${hl}</code></pre>`;
        } catch (_) {}
      }
      const esc = codeStr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<pre><code>${esc}</code></pre>`;
    };
    marked.use({ renderer });
  }

  // ─── 数学公式保护渲染（先于 marked，防止定界符被转义）───
  // 问题：marked 会把 \( 转成 (、\[ 转成 [；KaTeX 以 defer 加载，
  //       loadList() fetch 极快返回时 katex 可能尚未就绪。
  // 方案：提取公式 → 替换为 data-* span → marked 处理其余内容 →
  //       DOM 插入后调用 renderPendingMath()，自动等待 KaTeX 就绪。
  function parseMdWithMath(md) {
    const stored = [];
    function stash(content, display) {
      // 用 data 属性保存公式，base64 避免 HTML 特殊字符干扰
      const idx = stored.length;
      stored.push({ content, display });
      // display math 用 <div> 块级容器，inline 用 <span>
      const tag = display ? 'div' : 'span';
      const safeContent = content.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return `<${tag} class="katex-pending" data-formula="${safeContent}" data-display="${display}"></${tag}>`;
    }
    // 按优先级：块级先于行内，避免 $$ 被 $ 误截
    let s = md
      .replace(/\\\[([\s\S]+?)\\\]/g,  function(_, c) { return stash(c, true);  })
      .replace(/\$\$([\s\S]+?)\$\$/g,  function(_, c) { return stash(c, true);  })
      .replace(/\\\((.+?)\\\)/g,       function(_, c) { return stash(c, false); })
      .replace(/\$([^\$\n]+?)\$/g, function(_, c) {
        // 仅含 LaTeX 特殊字符时才视为公式，避免误匹配价格 $5
        return /[\\{}^_]/.test(c) ? stash(c, false) : '$' + c + '$';
      });

    return typeof marked !== 'undefined' ? marked.parse(s) : '<pre>' + s + '</pre>';
  }

  // ─── 渲染 DOM 中所有待渲染的数学公式 ───
  // KaTeX 以 defer 加载；若尚未就绪则轮询等待（最多 10 s）。
  function renderPendingMath(container) {
    const els = Array.from(container.querySelectorAll('.katex-pending'));
    if (!els.length) return;

    function doRender() {
      els.forEach(function(el) {
        if (!el.isConnected) return; // 已被替换或文档已切换
        var formula = el.getAttribute('data-formula')
          .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
        var display  = el.getAttribute('data-display') === 'true';
        try {
          var rendered = katex.renderToString(formula, {
            displayMode: display, throwOnError: false, output: 'html'
          });
          // insertAdjacentHTML + remove 避免嵌套多余 wrapper 元素
          el.insertAdjacentHTML('beforebegin', rendered);
          el.remove();
        } catch (e) {
          el.outerHTML = (display ? '\\[' : '\\(') + formula + (display ? '\\]' : '\\)');
        }
      });
    }

    if (typeof katex !== 'undefined') {
      doRender();
    } else {
      // 轮询等待 KaTeX（最多 100 × 100ms = 10s）
      var attempts = 0;
      var timer = setInterval(function() {
        attempts++;
        if (typeof katex !== 'undefined') {
          clearInterval(timer);
          doRender();
        } else if (attempts >= 100) {
          clearInterval(timer);
          // 超时：降级显示原始 LaTeX
          els.forEach(function(el) {
            if (!el.isConnected) return;
            var f = el.getAttribute('data-formula').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
            var d = el.getAttribute('data-display') === 'true';
            el.outerHTML = (d ? '\\[' : '\\(') + f + (d ? '\\]' : '\\)');
          });
        }
      }, 100);
    }
  }

  // ─── 渲染 DOM 中所有待渲染的 Mermaid 图 ───
  // mermaid 以 ES module import，window.mermaid 可能尚未就绪；轮询等待最多 10s。
  // 单图渲染加 15s 硬超时（防 ELK 懒加载链卡死），超时即降级为 <pre> 显示
  // 原始源码与错误信息，不阻塞页面。
  function renderWithTimeout(id, source, ms) {
    return Promise.race([
      window.mermaid.render(id, source),
      new Promise(function(_, reject) {
        setTimeout(function() {
          reject(new Error('render timeout after ' + ms + 'ms (检查 Console: ELK 是否加载成功)'));
        }, ms);
      }),
    ]);
  }
  async function renderPendingMermaid(container) {
    const els = Array.from(container.querySelectorAll('.mermaid-pending'));
    if (!els.length) return;

    async function doRender() {
      for (const el of els) {
        if (!el.isConnected) continue;
        const source = el.textContent;
        const id = 'mmd-' + Math.random().toString(36).slice(2, 10);
        try {
          const { svg } = await renderWithTimeout(id, source, 15000);
          const wrapper = document.createElement('div');
          wrapper.className = 'mermaid';
          wrapper.innerHTML = svg;
          el.replaceWith(wrapper);
          // 为 mermaid SVG 绑定点击放大（lightbox 内按 SVG 原始 viewBox 渲染，矢量无损）
          const svgEl = wrapper.querySelector('svg');
          if (svgEl) {
            svgEl.addEventListener('click', () => {
              openLightbox({ svg: svgEl.outerHTML, alt: 'Mermaid 图表', kind: 'svg' });
            });
          }
        } catch (e) {
          const pre = document.createElement('pre');
          pre.className = 'mermaid-error';
          pre.textContent = '[mermaid render error] ' + (e && e.message ? e.message : e) + '\n\n' + source;
          el.replaceWith(pre);
        }
      }
    }

    if (window.mermaid) {
      await doRender();
      return;
    }
    let attempts = 0;
    const timer = setInterval(async () => {
      attempts++;
      if (window.mermaid) {
        clearInterval(timer);
        await doRender();
      } else if (attempts >= 100) {
        clearInterval(timer);
        // 超时：降级为原始代码块
        els.forEach(function(el) {
          if (!el.isConnected) return;
          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.className = 'language-mermaid';
          code.textContent = el.textContent;
          pre.appendChild(code);
          el.replaceWith(pre);
        });
      }
    }, 100);
  }

  // ─── 图片 / Mermaid 点击放大（Lightbox） ───
  // 解决：静态 PNG 截图随容器宽自适应缩放后看不清细节；mermaid SVG 在窄屏被压缩到不可读。
  // 方案：单例全屏遮罩 + 缩放/平移/原始尺寸/适应屏幕/新窗口打开/Esc 关闭。
  //   - PNG 用原始 src 打开（浏览器按图像位图加载，缩放到 100% 即接近 1:1 像素）
  //   - SVG 直接克隆 outerHTML 进 lightbox-canvas，矢量缩放无损
  //   - 缩放：toolbar +/− 按钮（×1.25 / ÷1.25）/ Ctrl+滚轮 / 双击切换 fit↔1:1
  //   - 平移：拖拽（mousedown→mousemove），适合放大后定位细节
  //   - 键盘：Esc 关闭，0/F=fit，1=1:1，+/=放大，-缩小
  let _lb = null;
  let _lbState = {
    kind: 'img',          // 'img' | 'svg'
    naturalW: 0,          // 内容原始宽（px 或 viewBox.width）
    zoom: 1,              // 当前显示比例（1 = 1:1）
    fitZoom: 1,           // 适应屏幕的比例
    dragging: false,
    sx: 0, sy: 0,         // 拖拽起点
    dx: 0, dy: 0          // 拖拽起点 stage 的 scrollLeft/Top
  };

  function _ensureLightbox() {
    if (_lb) return _lb;
    _lb = document.createElement('div');
    _lb.className = 'lightbox';
    _lb.innerHTML = ''
      + '<div class="lightbox-toolbar">'
      +   '<span class="lightbox-title"></span>'
      +   '<span class="lightbox-zoom"></span>'
      +   '<button class="lightbox-btn" data-action="fit" title="适应屏幕 (F / 0)">⤢</button>'
      +   '<button class="lightbox-btn" data-action="actual" title="原始尺寸 (1)">1:1</button>'
      +   '<button class="lightbox-btn" data-action="zoom-out" title="缩小 (-)">−</button>'
      +   '<button class="lightbox-btn" data-action="zoom-in" title="放大 (+)">＋</button>'
      +   '<a class="lightbox-btn" data-action="open" target="_blank" rel="noopener" title="新标签打开">↗</a>'
      +   '<button class="lightbox-btn" data-action="close" title="关闭 (Esc)">✕</button>'
      + '</div>'
      + '<div class="lightbox-stage"><div class="lightbox-canvas"></div></div>';
    document.body.appendChild(_lb);

    const stage = _lb.querySelector('.lightbox-stage');
    const canvas = _lb.querySelector('.lightbox-canvas');

    _lb.addEventListener('click', (e) => {
      const action = e.target.closest('[data-action]')?.getAttribute('data-action');
      if (action) { _lbAction(action); return; }
      if (e.target === _lb || e.target === stage) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!_lb || !_lb.classList.contains('open')) return;
      const k = e.key;
      if (k === 'Escape') { closeLightbox(); e.preventDefault(); }
      else if (k === '+' || k === '=') { _lbAction('zoom-in'); e.preventDefault(); }
      else if (k === '-' || k === '_') { _lbAction('zoom-out'); e.preventDefault(); }
      else if (k === '0' || k === 'f' || k === 'F') { _lbAction('fit'); e.preventDefault(); }
      else if (k === '1') { _lbAction('actual'); e.preventDefault(); }
    });

    stage.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      _lbAction(e.deltaY < 0 ? 'zoom-in' : 'zoom-out');
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      _lbState.dragging = true;
      _lbState.sx = e.clientX; _lbState.sy = e.clientY;
      _lbState.dx = stage.scrollLeft; _lbState.dy = stage.scrollTop;
      stage.classList.add('is-panning');
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!_lbState.dragging) return;
      stage.scrollLeft = _lbState.dx - (e.clientX - _lbState.sx);
      stage.scrollTop  = _lbState.dy - (e.clientY - _lbState.sy);
    });
    window.addEventListener('mouseup', () => {
      if (!_lbState.dragging) return;
      _lbState.dragging = false;
      stage.classList.remove('is-panning');
    });
    canvas.addEventListener('dblclick', (e) => {
      e.preventDefault();
      _lbAction(Math.abs(_lbState.zoom - _lbState.fitZoom) < 0.02 ? 'actual' : 'fit');
    });

    return _lb;
  }

  function _applyLbZoom() {
    if (!_lb || !_lbState.naturalW) return;
    const target = _lb.querySelector('.lightbox-canvas img, .lightbox-canvas svg');
    if (!target) return;
    const w = Math.max(1, Math.round(_lbState.naturalW * _lbState.zoom));
    target.style.width = w + 'px';
    target.removeAttribute('height'); // 让浏览器按 aspect ratio 自适应高度
    target.style.height = 'auto';
    _lb.querySelector('.lightbox-zoom').textContent = `${Math.round(_lbState.zoom * 100)}%`;
  }

  function _measureFitZoom() {
    if (!_lb || !_lbState.naturalW) return 1;
    const stage = _lb.querySelector('.lightbox-stage');
    const target = _lb.querySelector('.lightbox-canvas img, .lightbox-canvas svg');
    if (!target) return 1;
    const sw = stage.clientWidth - 32;
    const sh = stage.clientHeight - 32;
    if (sw <= 0 || sh <= 0) return 1;
    // 按内容原始宽计算 fit；高度根据 aspect ratio 推导
    const naturalH = _lbState.naturalH || (_lbState.naturalW * (target.naturalHeight || 1) / (target.naturalWidth || 1));
    const wRatio = sw / _lbState.naturalW;
    const hRatio = sh / naturalH;
    return Math.max(0.05, Math.min(1, Math.min(wRatio, hRatio)));
  }

  function _lbAction(action) {
    if (!_lb) return;
    if (action === 'close') return closeLightbox();
    if (action === 'open') return; // <a target=_blank> 自身处理
    if (action === 'fit') _lbState.zoom = _lbState.fitZoom;
    else if (action === 'actual') _lbState.zoom = 1;
    else if (action === 'zoom-in') _lbState.zoom = Math.min(8, _lbState.zoom * 1.25);
    else if (action === 'zoom-out') _lbState.zoom = Math.max(0.05, _lbState.zoom / 1.25);
    _applyLbZoom();
  }

  function openLightbox({ src, svg, alt, kind }) {
    const lb = _ensureLightbox();
    const canvas = lb.querySelector('.lightbox-canvas');
    const openBtn = lb.querySelector('[data-action="open"]');
    lb.querySelector('.lightbox-title').textContent = alt || (src ? src.split('/').pop() : 'Diagram');

    canvas.innerHTML = '';
    _lbState.kind = kind;
    _lbState.naturalW = 0;
    _lbState.naturalH = 0;
    _lbState.zoom = 1;
    _lbState.fitZoom = 1;

    function _refit() {
      _lbState.fitZoom = _measureFitZoom();
      _lbState.zoom = _lbState.fitZoom;
      _applyLbZoom();
    }

    if (kind === 'svg' && svg) {
      canvas.innerHTML = svg;
      const svgEl = canvas.querySelector('svg');
      if (svgEl) {
        // 清掉 mermaid 设的 max-width/style，让我们能按 viewBox 自由控制宽度
        svgEl.removeAttribute('style');
        const vb = svgEl.viewBox && svgEl.viewBox.baseVal;
        const w = (vb && vb.width) || svgEl.getBBox?.().width || 800;
        const h = (vb && vb.height) || svgEl.getBBox?.().height || 600;
        _lbState.naturalW = w;
        _lbState.naturalH = h;
        // 确保 SVG 用 viewBox 而不是固定 width/height 限制缩放
        if (!svgEl.getAttribute('viewBox') && w && h) {
          svgEl.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      }
      openBtn.style.display = 'none';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(_refit);
    } else {
      const img = document.createElement('img');
      img.alt = alt || '';
      img.draggable = false;
      canvas.appendChild(img);
      openBtn.href = src;
      openBtn.style.display = '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      img.addEventListener('load', () => {
        _lbState.naturalW = img.naturalWidth;
        _lbState.naturalH = img.naturalHeight;
        _refit();
      }, { once: true });
      img.src = src;
    }
  }

  function closeLightbox() {
    if (!_lb) return;
    _lb.classList.remove('open');
    document.body.style.overflow = '';
    const canvas = _lb.querySelector('.lightbox-canvas');
    canvas.innerHTML = '';
  }

  // 暴露给手动场景使用（暂未用到，留扩展位）
  window.__openLightbox = openLightbox;
  window.__closeLightbox = closeLightbox;

  // ─── 文档相对路径解析 ───
  //   currentDir: 当前文档所在的 docs 内目录（如 'architecture'，根目录传 ''）
  //   href:       markdown 中写的相对路径（如 '../algorithms/X.md' / './Y.md' / 'Z.md'）
  //   返回：以 docs/ 为根的标准化相对路径（如 'algorithms/X.md'）。
  // 用纯 split/stack 实现而非 `new URL(href, base)`，避免引入虚假 origin
  // 和对 file:/// 等场景的兼容坑。
  function _resolveDocPath(currentDir, href) {
    const stack = currentDir ? currentDir.split('/').filter(Boolean) : [];
    for (const seg of href.split('/')) {
      if (seg === '' || seg === '.') continue;
      if (seg === '..') { stack.pop(); continue; }
      stack.push(seg);
    }
    return stack.join('/');
  }

  // 在 _categories 中按 basename 反查完整 docs 内路径（兜底裸 filename）
  function _findDocByBasename(basename) {
    if (!basename || !Array.isArray(_categories)) return null;
    for (const cat of _categories) {
      const lists = [cat.docs || []];
      for (const g of (cat.groups || [])) lists.push(g.docs || []);
      for (const list of lists) {
        for (const d of list) {
          if (!d || !d.file) continue;
          if (d.file === basename) return d.file;
          const tail = d.file.split('/').pop();
          if (tail === basename) return d.file;
        }
      }
    }
    return null;
  }

  // ─── 渲染后处理：标题加 id + 链接分类修正 ───
  // 之所以用 DOM 后处理而非 renderer.link/heading：
  //   marked v12 在 marked.use({ renderer: instance }) 下
  //   heading/link 覆写不可靠，code 覆写正常，故统一后处理规避 API 差异。
  function fixRenderedContent(container) {
    // 1. 为每个标题生成 GitHub 风格 id（支持目录锚点跳转）
    container.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(el => {
      if (el.id) return; // 已有 id 则跳过
      const id = el.textContent
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fa5\s\-]/g, '')  // 保留中文/字母/数字/横线
        .replace(/\s+/g, '-')
        .replace(/-{2,}/g, '-')
        .replace(/^-|-$/g, '');
      if (id) el.id = id;
    });

    // 2. 修正所有相对路径图片：./assets/x.png → /docs/asset/<currentDocDir>/assets/x.png
    //    供 markdown 中 ![alt](./assets/x.png) 在门户内正确加载（GitHub 上仍按相对路径渲染）
    //    同时：
    //      · 加 .zoomable + 点击放大（lightbox），解决静态截图缩放后的清晰度问题
    //      · 加 onerror 自动 cache-busting 重试一次（防御浏览器缓存了历史失败响应，
    //        如曾经出现过的 architecture-overview.png 扩展名/MIME 不一致死锁）
    //      · 重试仍失败则在原位渲染醒目错误条，含 URL 与 HTTP 状态，方便用户上报
    const currentDir = (_current || '').includes('/')
      ? _current.slice(0, _current.lastIndexOf('/'))
      : '';
    container.querySelectorAll('img[src]').forEach(el => {
      const src = el.getAttribute('src') || '';
      if (!/^(?:https?:|data:|blob:|\/)/.test(src)) {
        const clean = src.replace(/^\.\//, '');
        const resolved = currentDir ? `${currentDir}/${clean}` : clean;
        el.setAttribute('src', `${API_BASE}/docs/asset/${resolved}`);
      }
      el.setAttribute('loading', 'lazy');
      el.classList.add('zoomable');

      // onerror 自愈：先尝试 cache-busting 一次，仍失败再回退到错误占位
      el.addEventListener('error', function onErr() {
        if (el.dataset.lbRetried === '1') {
          // 已重试仍失败：换成醒目的错误占位条 + 完整诊断（明文 URL +
          // 当前 origin + "运行诊断"按钮，按钮会跑 fetch 并把状态码 / 响应
          // 头 / 前 80 字节贴回页面，便于用户截图上报，免去开 DevTools）
          const failedUrl = el.src;
          const escAttr = s => String(s).replace(/[<>&"']/g, c =>
            ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
          const placeholder = document.createElement('div');
          placeholder.className = 'img-load-error';
          placeholder.innerHTML = `
            <strong>图片加载失败</strong>
            <span class="ile-alt">${escAttr(el.alt || '')}</span>
            <code class="ile-url" title="点击复制">${escAttr(failedUrl)}</code>
            <span class="ile-meta">page origin: <code>${escAttr(location.origin)}</code> · API_BASE: <code>${escAttr(API_BASE || '(empty / same-origin)')}</code></span>
            <div class="ile-actions">
              <a href="${escAttr(failedUrl)}" target="_blank" rel="noopener">直接打开 ↗</a>
              <button type="button" class="ile-diag">运行诊断</button>
            </div>
            <pre class="ile-diag-out" hidden></pre>`;
          el.replaceWith(placeholder);
          console.warn('[docs] image load failed:', failedUrl);

          placeholder.querySelector('.ile-url').addEventListener('click', () => {
            navigator.clipboard?.writeText(failedUrl).catch(() => {});
          });
          placeholder.querySelector('.ile-diag').addEventListener('click', async () => {
            const out = placeholder.querySelector('.ile-diag-out');
            out.hidden = false;
            out.textContent = '诊断中…';
            const lines = [];
            // 同 origin 直接 fetch + 候选 :5000 fetch（如 origin 不是 :5000）
            const targets = [failedUrl];
            try {
              const u = new URL(failedUrl, location.href);
              const altOrigin = 'http://' + u.hostname + ':5000';
              if (u.origin !== altOrigin) targets.push(altOrigin + u.pathname + u.search);
            } catch {}
            for (const t of targets) {
              try {
                const r = await fetch(t, { cache: 'no-store' });
                const ct = r.headers.get('content-type') || '(none)';
                const cl = r.headers.get('content-length') || '?';
                const buf = await r.clone().arrayBuffer();
                const head = Array.from(new Uint8Array(buf).slice(0, 8))
                  .map(b => b.toString(16).padStart(2, '0')).join(' ');
                lines.push(`[${r.status}] ${t}\n  Content-Type: ${ct}\n  Content-Length: ${cl}\n  body[0..8]: ${head}`);
              } catch (err) {
                lines.push(`[ERR] ${t}\n  ${err.name}: ${err.message}`);
              }
            }
            out.textContent = lines.join('\n\n');
          });
          return;
        }
        el.dataset.lbRetried = '1';
        const sep = el.src.includes('?') ? '&' : '?';
        const next = `${el.src}${sep}_t=${Date.now()}`;
        console.info('[docs] image retry with cache-bust:', next);
        el.src = next;
      }, { once: false });

      el.addEventListener('click', () => {
        openLightbox({ src: el.currentSrc || el.src, alt: el.alt || '', kind: 'img' });
      });
    });

    // 3. 修正所有链接
    container.querySelectorAll('a[href]').forEach(el => {
      const href = el.getAttribute('href') || '';

      // 3a. 外部链接 → 新标签页打开
      if (/^https?:\/\//.test(href)) {
        el.setAttribute('target', '_blank');
        el.setAttribute('rel', 'noopener');
        return;
      }

      // 3b. 页内锚点 (#xxx) → 平滑滚动，不触发 hashchange
      if (href.startsWith('#')) {
        const anchor = decodeURIComponent(href.slice(1));
        el.setAttribute('href', 'javascript:void(0)');
        el.addEventListener('click', e => { e.preventDefault(); scrollToId(anchor); });
        return;
      }

      // 3c. Markdown 文档链接 (*.md 或 *.md#section) → 门户内导航
      //
      //  ⚠️ 关键 bug 修复（2026-05）：旧实现 `filePart.split('/').pop()` 会把
      //     `../algorithms/ALGORITHMS_RL.md` 砍成 `ALGORITHMS_RL.md`，导致
      //     `_current` 丢失目录前缀，进而让该文档内所有相对路径图片
      //     `./assets/x.jpg` 拼成 `/docs/asset/assets/x.jpg`（缺中间目录）
      //     —— 整页破图。改为基于当前文档目录正确 resolve 出完整 docs 内路径。
      if (href.includes('.md')) {
        const hashIdx = href.indexOf('#');
        const filePart   = hashIdx >= 0 ? href.slice(0, hashIdx) : href;
        const anchorPart = hashIdx >= 0 ? href.slice(hashIdx + 1) : '';
        if (!filePart.endsWith('.md')) return;

        const resolved = _resolveDocPath(currentDir, filePart);
        el.setAttribute('href', 'javascript:void(0)');
        el.setAttribute('data-file', resolved);
        if (anchorPart) el.setAttribute('data-anchor', anchorPart);

        el.addEventListener('click', e => {
          e.preventDefault();
          openDoc(resolved, anchorPart || undefined);
        });
        return;
      }

      // 2d. javascript: / mailto: 等 → 不处理
    });

  }

  // ─── 状态 ───
  let _categories = [];   // [{category, docs:[{file, title}]}]
  let _current = null;    // 当前文档文件名

  // ─── DOM ───
  const $sidebar = document.getElementById('sidebar');
  const $main    = document.getElementById('main');
  const $search  = document.getElementById('search-input');
  const $count   = document.getElementById('doc-count');

  // ─── 加载文档列表 ───
  async function loadList() {
    try {
      const res = await fetch(`${API_BASE}/docs/list?_t=${Date.now()}`, { cache: 'no-store' });
      _categories = await res.json();
      // 统计文档总数
      const total = _categories.reduce((s, c) => s + allDocs(c).length, 0);
      $count.textContent = `${total} 篇文档`;
      renderSidebar('');
      // Hash 路由
      const hash = location.hash.replace('#', '');
      if (hash && hash.endsWith('.md')) {
        openDoc(hash);
      } else {
        renderWelcome();
      }
    } catch (e) {
      $main.innerHTML = `<div class="status-msg">⚠️ 无法加载文档列表：${e.message}</div>`;
    }
  }

  // ─── 渲染侧边栏 ───
  function allDocs(cat) {
    if (Array.isArray(cat.groups) && cat.groups.length) {
      return cat.groups.flatMap(g => g.docs || []);
    }
    return cat.docs || [];
  }

  function docMatches(d, q) {
    return !q || d.title.toLowerCase().includes(q) || d.file.toLowerCase().includes(q);
  }

  function renderSidebar(filter) {
    const q = filter.toLowerCase().trim();
    let html = '';
    _categories.forEach(cat => {
      const groups = Array.isArray(cat.groups) ? cat.groups : [];
      const items = allDocs(cat).filter(d => docMatches(d, q));
      if (!items.length) return;
      html += `<div class="cat-title">${cat.category}</div>`;
      if (groups.length) {
        groups.forEach(group => {
          const groupItems = (group.docs || []).filter(d => docMatches(d, q));
          if (!groupItems.length) return;
          html += `<div class="doc-subtitle">${group.name}</div>`;
          groupItems.forEach(d => {
            const active = d.file === _current ? ' active' : '';
            html += `<a class="doc-link${active}" data-file="${d.file}" title="${d.file}">${d.title}</a>`;
          });
        });
      } else {
        items.forEach(d => {
          const active = d.file === _current ? ' active' : '';
          html += `<a class="doc-link${active}" data-file="${d.file}" title="${d.file}">${d.title}</a>`;
        });
      }
    });
    $sidebar.innerHTML = html;
    // 事件代理
    $sidebar.querySelectorAll('.doc-link').forEach(el => {
      el.addEventListener('click', () => openDoc(el.dataset.file));
    });
  }

  // ─── 渲染欢迎首页 ───
  function renderWelcome() {
    _current = null;
    renderSidebar($search.value);
    let cardsHtml = '';
    _categories.forEach(cat => {
      allDocs(cat).forEach(d => {
        cardsHtml += `
          <div class="welcome-card" data-file="${d.file}">
            <div class="cat">${cat.category}</div>
            <div class="title">${d.title}</div>
          </div>`;
      });
    });
    $main.innerHTML = `
      <div class="welcome">
        <h1>📚 OpenBlock 文档中心</h1>
        <p>收录全部设计文档、研究报告与技术规范，点击卡片或左侧导航查阅任意文档。</p>
        <div style="margin:12px 0 20px;display:flex;gap:10px;flex-wrap:wrap">
          <a href="/ops" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#1a1d27,#22263a);color:#5B9BD5;border:1px solid rgba(91,155,213,.3);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">📊 运营看板</a>
          <a href="/" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#22263a,#2a2f45);color:#94a3b8;border:1px solid rgba(148,163,184,.2);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">🎮 返回游戏</a>
        </div>
        <div class="welcome-grid">${cardsHtml}</div>
      </div>`;
    $main.querySelectorAll('.welcome-card').forEach(el => {
      el.addEventListener('click', () => openDoc(el.dataset.file));
    });
  }

  // ─── 打开文档 ───
  async function openDoc(filename, scrollToAnchor) {
    // 兜底：如果传入的是裸文件名（历史 hash / 旧书签 / 第三方链接），
    // 从 _categories 反查完整的 docs 内路径，避免 _current 缺目录前缀
    // 导致后续图片相对路径全部拼错。
    if (filename && !filename.includes('/')) {
      const found = _findDocByBasename(filename);
      if (found && found !== filename) {
        console.info('[docs] resolved bare filename', filename, '→', found);
        filename = found;
      }
    }
    _current = filename;
    // 只在 hash 不同时更新，避免页内锚点触发多余的 hashchange
    if (location.hash !== '#' + filename) location.hash = filename;
    renderSidebar($search.value);
    $main.innerHTML = `<div class="status-msg"><div class="spinner"></div><span>加载中…</span></div>`;
    $main.scrollTop = 0;
    window.scrollTo(0, 0);

    try {
      const sep = filename.includes('?') ? '&' : '?';
      const res = await fetch(`${API_BASE}/docs/raw/${encodeURIComponent(filename)}${sep}_t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}（文档未找到）`);
      const md = await res.text();

      let catName = '';
      for (const cat of _categories) {
        const groups = Array.isArray(cat.groups) ? cat.groups : [];
        if (groups.length) {
          const group = groups.find(g => (g.docs || []).some(d => d.file === filename));
          if (group) { catName = `${cat.category} / ${group.name}`; break; }
        } else if ((cat.docs || []).some(d => d.file === filename)) {
          catName = cat.category;
          break;
        }
      }

      const html = parseMdWithMath(md);

      $main.innerHTML = `
        <nav class="breadcrumb">
          <a id="bc-home">首页</a>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 4 10 8 6 12"/></svg>
          <span>${catName}</span>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 4 10 8 6 12"/></svg>
          <span>${filename}</span>
        </nav>
        <article class="md-body" id="md-content">${html}</article>`;

      // 面包屑首页
      document.getElementById('bc-home').addEventListener('click', () => {
        history.pushState('', document.title, location.pathname);
        renderWelcome();
      });

      // ── DOM 后处理：修正所有标题 id 和链接 href ──
      const mdContent = document.getElementById('md-content');
      fixRenderedContent(mdContent);
      // 异步渲染数学公式（自动等待 KaTeX defer 脚本就绪）
      renderPendingMath(mdContent);
      // 异步渲染 Mermaid 图（自动等待 mermaid ES module 就绪）
      renderPendingMermaid(mdContent);

      // 若指定了锚点则滚过去（跨文档跳转后）
      if (scrollToAnchor) {
        setTimeout(() => scrollToId(scrollToAnchor), 80);
      }

    } catch (e) {
      $main.innerHTML = `<div class="status-msg">⚠️ 加载失败：${e.message}</div>`;
    }
  }

  // ─── 平滑滚动到元素 ID ───
  function scrollToId(anchor) {
    // 尝试直接 id 匹配，再尝试 decodeURIComponent
    let el = document.getElementById(anchor);
    if (!el) el = document.getElementById(decodeURIComponent(anchor));
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // ─── 搜索过滤 ───
  $search.addEventListener('input', () => {
    renderSidebar($search.value);
  });

  // ─── Logo / 首页按钮 ───
  document.getElementById('logo-home').addEventListener('click', e => {
    e.preventDefault();
    location.hash = '';
    renderWelcome();
  });

  // ─── Hash 路由（浏览器前进/后退）───
  window.addEventListener('hashchange', () => {
    const hash = decodeURIComponent(location.hash.replace('#', ''));
    if (!hash) {
      renderWelcome();
    } else if (hash.endsWith('.md')) {
      // 仅当文档切换时才重新加载（避免页内锚点触发重复加载）
      if (hash !== _current) openDoc(hash);
    }
    // 其余情况（页内锚点）由浏览器或 scrollToId 处理，不干预
  });

  // ─── 启动 ───
  loadList();
})();
</script>
