<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenBlock 文档中心</title>

  <!-- API base URL：通过 meta 注入，无 meta 时自动探测 -->
  <meta name="api-base" content="" />

  <!-- marked.js — Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <!-- highlight.js — 代码语法高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
  <!-- KaTeX — 数学公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid — 流程图 / 架构图 / 时序图渲染 -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { htmlLabels: true, useMaxWidth: true, curve: 'basis' },
      sequence: { useMaxWidth: true },
      themeVariables: { fontFamily: 'inherit', fontSize: '14px' }
    });
    window.mermaid = mermaid;
  </script>

  <style>
    /* ─── CSS 变量 ─── */
    :root {
      --bg:        #f5f7fa;
      --sidebar-bg:#ffffff;
      --content-bg:#ffffff;
      --border:    #e2e8f0;
      --accent:    #3b82f6;
      --accent-h:  #2563eb;
      --text:      #1e293b;
      --text-muted:#64748b;
      --active-bg: #eff6ff;
      --active-border: #3b82f6;
      --cat-color: #94a3b8;
      --code-bg:   #f8fafc;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
      --radius:    8px;
      --sidebar-w: 260px;
      --header-h:  52px;
    }

    /* ─── 重置 ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ─── 顶部导航栏 ─── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px;
      box-shadow: var(--shadow);
    }
    .header-logo {
      font-size: 16px; font-weight: 700; color: var(--accent);
      text-decoration: none; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .header-logo span { font-size: 20px; }
    .header-search {
      flex: 1; max-width: 320px;
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
    }
    .header-search svg { flex-shrink: 0; color: var(--text-muted); }
    .header-search input {
      border: none; background: transparent; outline: none;
      font-size: 13px; color: var(--text); width: 100%;
    }
    .header-search input::placeholder { color: var(--text-muted); }
    .header-stats {
      margin-left: auto; font-size: 12px; color: var(--text-muted);
      white-space: nowrap;
    }
    .header-game-link {
      font-size: 12px; color: var(--accent); text-decoration: none;
      padding: 5px 12px; border: 1px solid var(--accent);
      border-radius: 14px; white-space: nowrap;
      transition: background .15s;
    }
    .header-game-link:hover { background: var(--active-bg); }

    /* ─── 布局 ─── */
    .layout {
      display: flex;
      min-height: 100vh;
      padding-top: var(--header-h);
    }

    /* ─── 侧边栏 ─── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: fixed;
      top: var(--header-h);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 12px 0 24px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cat-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 10px 10px 3px;
      padding: 5px 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border-left: 3px solid var(--accent);
      border-radius: 0 5px 5px 0;
    }
    .cat-title::before {
      content: '';
      display: none;
    }
    .doc-link {
      display: block;
      padding: 6px 16px 6px 24px;
      font-size: 12.5px; color: var(--text-muted);
      text-decoration: none; cursor: pointer;
      border-left: 2px solid transparent;
      transition: color .12s, background .12s, border-color .12s;
      line-height: 1.4; word-break: break-all;
      white-space: normal;
    }
    .doc-link:hover { color: var(--text); background: var(--bg); }
    .doc-link.active {
      color: var(--accent); background: var(--active-bg);
      border-left-color: var(--active-border);
      font-weight: 500;
    }
    .doc-link.hidden { display: none; }
    .doc-subtitle {
      margin: 8px 14px 3px 24px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--text-muted);
    }

    /* ─── 主内容区 ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; min-width: 0;
      padding: 32px 40px 60px;
      max-width: 900px;
    }

    /* ─── 欢迎首页 ─── */
    .welcome {
      padding: 32px 0;
    }
    .welcome h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .welcome p { color: var(--text-muted); line-height: 1.7; margin-bottom: 24px; }
    .welcome-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .welcome-card {
      padding: 14px 16px;
      background: var(--content-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .welcome-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(59,130,246,.12); }
    .welcome-card .cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 6px; }
    .welcome-card .title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }

    /* ─── Markdown 内容渲染 ─── */
    .md-body {
      line-height: 1.75;
    }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-weight: 600; margin: 1.6em 0 .6em; line-height: 1.3;
    }
    .md-body h1 { font-size: 1.8em; border-bottom: 2px solid var(--border); padding-bottom: .4em; }
    .md-body h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
    .md-body h3 { font-size: 1.1em; }
    .md-body h4 { font-size: 1em; color: var(--text-muted); }
    .md-body p { margin: .8em 0; }
    .md-body ul, .md-body ol { padding-left: 1.6em; margin: .8em 0; }
    .md-body li { margin: .3em 0; }
    .md-body li > ul, .md-body li > ol { margin: .2em 0; }
    .md-body blockquote {
      border-left: 3px solid var(--accent); margin: 1em 0;
      padding: .6em 1em; background: var(--active-bg);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }
    .md-body code {
      font-family: 'JetBrains Mono', 'Fira Code', Menlo, Monaco, monospace;
      font-size: .86em; background: var(--code-bg);
      padding: .15em .4em; border-radius: 4px;
      border: 1px solid var(--border); color: #c0392b;
    }
    .md-body pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: var(--radius); overflow-x: auto;
      margin: 1em 0; padding: 1em 1.2em;
    }
    .md-body pre code {
      background: transparent; border: none; color: inherit;
      padding: 0; font-size: .85em;
    }
    .md-body table {
      border-collapse: collapse; width: 100%; margin: 1em 0;
      font-size: .9em;
    }
    .md-body th, .md-body td {
      border: 1px solid var(--border); padding: 7px 12px; text-align: left;
    }
    .md-body th { background: var(--bg); font-weight: 600; }
    .md-body tr:nth-child(even) td { background: #fafbfc; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    .md-body img { max-width: 100%; border-radius: var(--radius); }
    /* KaTeX 公式样式微调 */
    .md-body .katex-display { overflow-x: auto; overflow-y: hidden; padding: .2em 0; }
    .md-body .katex { font-size: 1.05em; }
    /* 公式等待 KaTeX 就绪时的占位样式 */
    .katex-pending { display: inline-block; color: var(--text-muted); font-style: italic; font-size: .9em; }
    .katex-pending::before { content: attr(data-formula); }

    /* ─── Mermaid 图样式 ─── */
    .md-body .mermaid {
      display: block;
      text-align: center;
      margin: 16px 0;
      background: var(--code-bg);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    .md-body .mermaid svg { max-width: 100%; height: auto; }
    /* 等待 mermaid 就绪时不显示原始源码（轮询完成会替换为 .mermaid 容器） */
    .md-body .mermaid-pending {
      display: block;
      min-height: 60px;
      background: var(--code-bg);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: transparent;
      font-size: 0;
      line-height: 0;
      position: relative;
    }
    .md-body .mermaid-pending::after {
      content: '正在渲染图表…';
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .md-body .mermaid-error {
      color: #c0392b;
      background: #fff5f5;
      border: 1px solid #f3c1c1;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }

    /* ─── 加载 / 错误 ─── */
    .status-msg {
      display: flex; align-items: center; justify-content: center;
      min-height: 200px; color: var(--text-muted); font-size: 14px;
      flex-direction: column; gap: 10px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 文档导航面包屑 ─── */
    .breadcrumb {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb svg { color: var(--text-muted); }

    /* ─── 顶部回到首页按钮 ─── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--accent); cursor: pointer;
      margin-bottom: 16px; text-decoration: none;
    }
    .back-btn:hover { text-decoration: underline; }

    /* ─── 响应式 ─── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 220px; }
      .main { padding: 20px 16px 40px; }
    }
    @media (max-width: 600px) {
      .sidebar { transform: translateX(-100%); transition: transform .2s; }
      .sidebar.open { transform: none; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- 顶部导航栏 -->
<header>
  <a class="header-logo" href="#" id="logo-home">
    <span>📚</span> OpenBlock 文档
  </a>
  <div class="header-search">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="6.5" cy="6.5" r="5"/><line x1="11" y1="11" x2="14" y2="14"/>
    </svg>
    <input id="search-input" type="text" placeholder="搜索文档…" autocomplete="off" />
  </div>
  <span class="header-stats" id="doc-count"></span>
  <a class="header-game-link" href="/" target="_blank">← 游戏</a>
</header>

<!-- 主布局 -->
<div class="layout">
  <!-- 侧边栏 -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- 主内容 -->
  <main class="main" id="main">
    <div class="status-msg"><div class="spinner"></div><span>加载文档列表…</span></div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ─── API base URL ───
  // 始终使用相对路径（空字符串），让请求走当前 origin：
  //   · Vite dev server（3000）→ vite.config.js proxy → Flask（5000）
  //   · Flask 直接访问（5000） → Flask 自身路由
  //   · 如需跨域，通过 <meta name="api-base"> 注入绝对地址
  const API_BASE = (document.querySelector('meta[name="api-base"]') || {}).content || '';

  // ─── marked 配置（只用 renderer 做代码高亮，链接/标题通过 DOM 后处理）───
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });

    const renderer = new marked.Renderer();
    renderer.code = function (code, lang) {
      const codeStr = typeof code === 'object' ? (code.text || '') : (code || '');
      const langStr = typeof code === 'object' ? (code.lang || lang || '') : (lang || '');
      // Mermaid 块：emit 占位符，DOM 插入后由 renderPendingMermaid 异步渲染。
      // 源码做 HTML 实体转义，innerHTML 后通过 textContent 还原回 Mermaid 原文。
      if (langStr === 'mermaid') {
        const esc = codeStr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="mermaid-pending">${esc}</div>`;
      }
      if (typeof hljs !== 'undefined' && langStr && hljs.getLanguage(langStr)) {
        try {
          const hl = hljs.highlight(codeStr, { language: langStr }).value;
          return `<pre><code class="hljs language-${langStr}">${hl}</code></pre>`;
        } catch (_) {}
      }
      const esc = codeStr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return `<pre><code>${esc}</code></pre>`;
    };
    marked.use({ renderer });
  }

  // ─── 数学公式保护渲染（先于 marked，防止定界符被转义）───
  // 问题：marked 会把 \( 转成 (、\[ 转成 [；KaTeX 以 defer 加载，
  //       loadList() fetch 极快返回时 katex 可能尚未就绪。
  // 方案：提取公式 → 替换为 data-* span → marked 处理其余内容 →
  //       DOM 插入后调用 renderPendingMath()，自动等待 KaTeX 就绪。
  function parseMdWithMath(md) {
    const stored = [];
    function stash(content, display) {
      // 用 data 属性保存公式，base64 避免 HTML 特殊字符干扰
      const idx = stored.length;
      stored.push({ content, display });
      // display math 用 <div> 块级容器，inline 用 <span>
      const tag = display ? 'div' : 'span';
      const safeContent = content.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return `<${tag} class="katex-pending" data-formula="${safeContent}" data-display="${display}"></${tag}>`;
    }
    // 按优先级：块级先于行内，避免 $$ 被 $ 误截
    let s = md
      .replace(/\\\[([\s\S]+?)\\\]/g,  function(_, c) { return stash(c, true);  })
      .replace(/\$\$([\s\S]+?)\$\$/g,  function(_, c) { return stash(c, true);  })
      .replace(/\\\((.+?)\\\)/g,       function(_, c) { return stash(c, false); })
      .replace(/\$([^\$\n]+?)\$/g, function(_, c) {
        // 仅含 LaTeX 特殊字符时才视为公式，避免误匹配价格 $5
        return /[\\{}^_]/.test(c) ? stash(c, false) : '$' + c + '$';
      });

    return typeof marked !== 'undefined' ? marked.parse(s) : '<pre>' + s + '</pre>';
  }

  // ─── 渲染 DOM 中所有待渲染的数学公式 ───
  // KaTeX 以 defer 加载；若尚未就绪则轮询等待（最多 10 s）。
  function renderPendingMath(container) {
    const els = Array.from(container.querySelectorAll('.katex-pending'));
    if (!els.length) return;

    function doRender() {
      els.forEach(function(el) {
        if (!el.isConnected) return; // 已被替换或文档已切换
        var formula = el.getAttribute('data-formula')
          .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
        var display  = el.getAttribute('data-display') === 'true';
        try {
          var rendered = katex.renderToString(formula, {
            displayMode: display, throwOnError: false, output: 'html'
          });
          // insertAdjacentHTML + remove 避免嵌套多余 wrapper 元素
          el.insertAdjacentHTML('beforebegin', rendered);
          el.remove();
        } catch (e) {
          el.outerHTML = (display ? '\\[' : '\\(') + formula + (display ? '\\]' : '\\)');
        }
      });
    }

    if (typeof katex !== 'undefined') {
      doRender();
    } else {
      // 轮询等待 KaTeX（最多 100 × 100ms = 10s）
      var attempts = 0;
      var timer = setInterval(function() {
        attempts++;
        if (typeof katex !== 'undefined') {
          clearInterval(timer);
          doRender();
        } else if (attempts >= 100) {
          clearInterval(timer);
          // 超时：降级显示原始 LaTeX
          els.forEach(function(el) {
            if (!el.isConnected) return;
            var f = el.getAttribute('data-formula').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
            var d = el.getAttribute('data-display') === 'true';
            el.outerHTML = (d ? '\\[' : '\\(') + f + (d ? '\\]' : '\\)');
          });
        }
      }, 100);
    }
  }

  // ─── 渲染 DOM 中所有待渲染的 Mermaid 图 ───
  // mermaid 以 ES module import，window.mermaid 可能尚未就绪；轮询等待最多 10s。
  // 失败时降级为 <pre> 显示原始源码，不阻塞页面。
  async function renderPendingMermaid(container) {
    const els = Array.from(container.querySelectorAll('.mermaid-pending'));
    if (!els.length) return;

    async function doRender() {
      for (const el of els) {
        if (!el.isConnected) continue;
        const source = el.textContent;
        const id = 'mmd-' + Math.random().toString(36).slice(2, 10);
        try {
          const { svg } = await window.mermaid.render(id, source);
          const wrapper = document.createElement('div');
          wrapper.className = 'mermaid';
          wrapper.innerHTML = svg;
          el.replaceWith(wrapper);
        } catch (e) {
          const pre = document.createElement('pre');
          pre.className = 'mermaid-error';
          pre.textContent = '[mermaid render error] ' + (e && e.message ? e.message : e) + '\n\n' + source;
          el.replaceWith(pre);
        }
      }
    }

    if (window.mermaid) {
      await doRender();
      return;
    }
    let attempts = 0;
    const timer = setInterval(async () => {
      attempts++;
      if (window.mermaid) {
        clearInterval(timer);
        await doRender();
      } else if (attempts >= 100) {
        clearInterval(timer);
        // 超时：降级为原始代码块
        els.forEach(function(el) {
          if (!el.isConnected) return;
          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.className = 'language-mermaid';
          code.textContent = el.textContent;
          pre.appendChild(code);
          el.replaceWith(pre);
        });
      }
    }, 100);
  }

  // ─── 渲染后处理：标题加 id + 链接分类修正 ───
  // 之所以用 DOM 后处理而非 renderer.link/heading：
  //   marked v12 在 marked.use({ renderer: instance }) 下
  //   heading/link 覆写不可靠，code 覆写正常，故统一后处理规避 API 差异。
  function fixRenderedContent(container) {
    // 1. 为每个标题生成 GitHub 风格 id（支持目录锚点跳转）
    container.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(el => {
      if (el.id) return; // 已有 id 则跳过
      const id = el.textContent
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fa5\s\-]/g, '')  // 保留中文/字母/数字/横线
        .replace(/\s+/g, '-')
        .replace(/-{2,}/g, '-')
        .replace(/^-|-$/g, '');
      if (id) el.id = id;
    });

    // 2. 修正所有链接
    container.querySelectorAll('a[href]').forEach(el => {
      const href = el.getAttribute('href') || '';

      // 2a. 外部链接 → 新标签页打开
      if (/^https?:\/\//.test(href)) {
        el.setAttribute('target', '_blank');
        el.setAttribute('rel', 'noopener');
        return;
      }

      // 2b. 页内锚点 (#xxx) → 平滑滚动，不触发 hashchange
      if (href.startsWith('#')) {
        const anchor = decodeURIComponent(href.slice(1));
        el.setAttribute('href', 'javascript:void(0)');
        el.addEventListener('click', e => { e.preventDefault(); scrollToId(anchor); });
        return;
      }

      // 2c. Markdown 文档链接 (*.md 或 *.md#section) → 门户内导航
      if (href.includes('.md')) {
        const hashIdx = href.indexOf('#');
        const filePart   = hashIdx >= 0 ? href.slice(0, hashIdx) : href;
        const anchorPart = hashIdx >= 0 ? href.slice(hashIdx + 1) : '';
        const filename   = filePart.split('/').pop(); // 只取文件名
        if (!filename.endsWith('.md')) return;

        el.setAttribute('href', 'javascript:void(0)');
        el.setAttribute('data-file', filename);
        if (anchorPart) el.setAttribute('data-anchor', anchorPart);

        el.addEventListener('click', e => {
          e.preventDefault();
          openDoc(filename, anchorPart || undefined);
        });
        return;
      }

      // 2d. javascript: / mailto: 等 → 不处理
    });

  }

  // ─── 状态 ───
  let _categories = [];   // [{category, docs:[{file, title}]}]
  let _current = null;    // 当前文档文件名

  // ─── DOM ───
  const $sidebar = document.getElementById('sidebar');
  const $main    = document.getElementById('main');
  const $search  = document.getElementById('search-input');
  const $count   = document.getElementById('doc-count');

  // ─── 加载文档列表 ───
  async function loadList() {
    try {
      const res = await fetch(`${API_BASE}/docs/list`);
      _categories = await res.json();
      // 统计文档总数
      const total = _categories.reduce((s, c) => s + allDocs(c).length, 0);
      $count.textContent = `${total} 篇文档`;
      renderSidebar('');
      // Hash 路由
      const hash = location.hash.replace('#', '');
      if (hash && hash.endsWith('.md')) {
        openDoc(hash);
      } else {
        renderWelcome();
      }
    } catch (e) {
      $main.innerHTML = `<div class="status-msg">⚠️ 无法加载文档列表：${e.message}</div>`;
    }
  }

  // ─── 渲染侧边栏 ───
  function allDocs(cat) {
    if (Array.isArray(cat.groups) && cat.groups.length) {
      return cat.groups.flatMap(g => g.docs || []);
    }
    return cat.docs || [];
  }

  function docMatches(d, q) {
    return !q || d.title.toLowerCase().includes(q) || d.file.toLowerCase().includes(q);
  }

  function renderSidebar(filter) {
    const q = filter.toLowerCase().trim();
    let html = '';
    _categories.forEach(cat => {
      const groups = Array.isArray(cat.groups) ? cat.groups : [];
      const items = allDocs(cat).filter(d => docMatches(d, q));
      if (!items.length) return;
      html += `<div class="cat-title">${cat.category}</div>`;
      if (groups.length) {
        groups.forEach(group => {
          const groupItems = (group.docs || []).filter(d => docMatches(d, q));
          if (!groupItems.length) return;
          html += `<div class="doc-subtitle">${group.name}</div>`;
          groupItems.forEach(d => {
            const active = d.file === _current ? ' active' : '';
            html += `<a class="doc-link${active}" data-file="${d.file}" title="${d.file}">${d.title}</a>`;
          });
        });
      } else {
        items.forEach(d => {
          const active = d.file === _current ? ' active' : '';
          html += `<a class="doc-link${active}" data-file="${d.file}" title="${d.file}">${d.title}</a>`;
        });
      }
    });
    $sidebar.innerHTML = html;
    // 事件代理
    $sidebar.querySelectorAll('.doc-link').forEach(el => {
      el.addEventListener('click', () => openDoc(el.dataset.file));
    });
  }

  // ─── 渲染欢迎首页 ───
  function renderWelcome() {
    _current = null;
    renderSidebar($search.value);
    let cardsHtml = '';
    _categories.forEach(cat => {
      allDocs(cat).forEach(d => {
        cardsHtml += `
          <div class="welcome-card" data-file="${d.file}">
            <div class="cat">${cat.category}</div>
            <div class="title">${d.title}</div>
          </div>`;
      });
    });
    $main.innerHTML = `
      <div class="welcome">
        <h1>📚 OpenBlock 文档中心</h1>
        <p>收录全部设计文档、研究报告与技术规范，点击卡片或左侧导航查阅任意文档。</p>
        <div style="margin:12px 0 20px;display:flex;gap:10px;flex-wrap:wrap">
          <a href="/ops" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#1a1d27,#22263a);color:#5B9BD5;border:1px solid rgba(91,155,213,.3);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">📊 运营看板</a>
          <a href="/" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,#22263a,#2a2f45);color:#94a3b8;border:1px solid rgba(148,163,184,.2);border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .15s" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">🎮 返回游戏</a>
        </div>
        <div class="welcome-grid">${cardsHtml}</div>
      </div>`;
    $main.querySelectorAll('.welcome-card').forEach(el => {
      el.addEventListener('click', () => openDoc(el.dataset.file));
    });
  }

  // ─── 打开文档 ───
  async function openDoc(filename, scrollToAnchor) {
    _current = filename;
    // 只在 hash 不同时更新，避免页内锚点触发多余的 hashchange
    if (location.hash !== '#' + filename) location.hash = filename;
    renderSidebar($search.value);
    $main.innerHTML = `<div class="status-msg"><div class="spinner"></div><span>加载中…</span></div>`;
    $main.scrollTop = 0;
    window.scrollTo(0, 0);

    try {
      const res = await fetch(`${API_BASE}/docs/raw/${encodeURIComponent(filename)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}（文档未找到）`);
      const md = await res.text();

      let catName = '';
      for (const cat of _categories) {
        const groups = Array.isArray(cat.groups) ? cat.groups : [];
        if (groups.length) {
          const group = groups.find(g => (g.docs || []).some(d => d.file === filename));
          if (group) { catName = `${cat.category} / ${group.name}`; break; }
        } else if ((cat.docs || []).some(d => d.file === filename)) {
          catName = cat.category;
          break;
        }
      }

      const html = parseMdWithMath(md);

      $main.innerHTML = `
        <nav class="breadcrumb">
          <a id="bc-home">首页</a>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 4 10 8 6 12"/></svg>
          <span>${catName}</span>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 4 10 8 6 12"/></svg>
          <span>${filename}</span>
        </nav>
        <article class="md-body" id="md-content">${html}</article>`;

      // 面包屑首页
      document.getElementById('bc-home').addEventListener('click', () => {
        history.pushState('', document.title, location.pathname);
        renderWelcome();
      });

      // ── DOM 后处理：修正所有标题 id 和链接 href ──
      const mdContent = document.getElementById('md-content');
      fixRenderedContent(mdContent);
      // 异步渲染数学公式（自动等待 KaTeX defer 脚本就绪）
      renderPendingMath(mdContent);
      // 异步渲染 Mermaid 图（自动等待 mermaid ES module 就绪）
      renderPendingMermaid(mdContent);

      // 若指定了锚点则滚过去（跨文档跳转后）
      if (scrollToAnchor) {
        setTimeout(() => scrollToId(scrollToAnchor), 80);
      }

    } catch (e) {
      $main.innerHTML = `<div class="status-msg">⚠️ 加载失败：${e.message}</div>`;
    }
  }

  // ─── 平滑滚动到元素 ID ───
  function scrollToId(anchor) {
    // 尝试直接 id 匹配，再尝试 decodeURIComponent
    let el = document.getElementById(anchor);
    if (!el) el = document.getElementById(decodeURIComponent(anchor));
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // ─── 搜索过滤 ───
  $search.addEventListener('input', () => {
    renderSidebar($search.value);
  });

  // ─── Logo / 首页按钮 ───
  document.getElementById('logo-home').addEventListener('click', e => {
    e.preventDefault();
    location.hash = '';
    renderWelcome();
  });

  // ─── Hash 路由（浏览器前进/后退）───
  window.addEventListener('hashchange', () => {
    const hash = decodeURIComponent(location.hash.replace('#', ''));
    if (!hash) {
      renderWelcome();
    } else if (hash.endsWith('.md')) {
      // 仅当文档切换时才重新加载（避免页内锚点触发重复加载）
      if (hash !== _current) openDoc(hash);
    }
    // 其余情况（页内锚点）由浏览器或 scrollToId 处理，不干预
  });

  // ─── 启动 ───
  loadList();
})();
</script>
