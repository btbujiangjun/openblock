# v1.71 MM3：每周自动跑 LL3 audit-artifacts，写 GitHub Issue 汇报
# 规范遵循：
#   - II4 retention: 报告 artifact retention-days=90（趋势类）
#   - JJ5 lint:strict: workflow 用 actions/* @v4（可信组织，LL4 接受）
#   - LL3 audit-artifacts.mjs: 不主动删，仅审计 + ancient>5 时 fail

name: weekly-artifact-audit

on:
  schedule:
    - cron: '0 4 * * 1'   # 周一 04:00 UTC（错开 weekly-dead-code 03:00 UTC）
  workflow_dispatch: {}    # 支持手动触发

permissions:
  contents: read
  issues: write           # 写汇报 Issue

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run artifact audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node scripts/audit-artifacts.mjs \
            --owner ${{ github.repository_owner }} \
            --repo ${{ github.event.repository.name }} \
            --out /tmp/audit-report.md
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "audit_status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "audit_status=ok" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artifact-audit-week-${{ github.run_number }}
          path: /tmp/audit-report.md
          retention-days: 90   # II4: 趋势/审计类 90 天
      - name: Create or reuse fixed audit issue (NN-B5: single tracker issue)
        if: always()
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.audit_status }}
        uses: actions/github-script@v7
        with:
          script: |
            /* NN-B5：固定 Issue 复用——无论 ok/fail 每周都更新同一 Issue。
             * 旧实现每月 1 号 + fail 时新建，1 年累积 12+ closed issue。
             * 新实现：用 label "audit:artifact:tracker" 标记唯一 tracker issue，
             *   - 存在（含 open/closed）→ 更新 body + 重开（若 closed）
             *   - 不存在 → 创建
             * fail 时额外 ping comment 提醒；ok 静默更新。 */
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/audit-report.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const status = process.env.AUDIT_STATUS;  /* NN-B2: env 中转防注入 */
            const title = `[weekly-audit] CI artifact health tracker`;
            const finalBody = `_Last updated: **${today}** · Status: **${status}**_\n\n${body}\n\n---\n_由 weekly-artifact-audit.yml 自动更新（NN-B5 tracker pattern）_`;
            const LABEL = 'audit:artifact:tracker';
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue label:"${LABEL}"`,
              per_page: 1,
            });
            const existing = search.data.items[0];
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number,
                body: finalBody,
                state: 'open',
              });
              if (status === 'fail') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `⚠️ Audit FAIL on ${today}. See body for details.`,
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body: finalBody, labels: [LABEL],
              });
            }
