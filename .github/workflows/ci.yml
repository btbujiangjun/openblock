name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  # perf-check 需要在 PR 上评论
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # GG4: lint:strict 等价 `eslint --max-warnings 0`，让 warnings
      # 也阻塞 CI。前提：FF1 已把现存 4 problems 清零，GG4 守住基线
      # 防止退步。新违例必须修复或加 // eslint-disable-next-line 显式
      # 标注（强制开发者意识到债务），不允许 warning 静默累积。
      - run: npm run lint:strict
      # JJ5: 工作流静态检查——upload-artifact 必须显式 retention-days。
      # 把 II4 文档规范升级为 CI 硬阻断，防新加 workflow 漏配 retention。
      - run: npm run lint:workflows
      - name: vitest with coverage
        run: npx vitest run --coverage
        env:
          CI: 'true'
      - run: npm run build
      - name: Bundle size budget
        # Fails CI if the main entry chunk exceeds 360 KB (uncompressed).
        # Enforces the v1.15 code-split target. Bump deliberately when
        # adding a justified core-path dependency.
        run: node scripts/check-bundle-size.mjs
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 30  # II4: coverage 短期诊断够用

  perf-check:
    # 性能基线"软警告"。GitHub Actions runner 与开发本机硬件不同，绝对值
    # 不可比；但「相对于 baseline 的退化幅度」在同一个 runner 池里仍是
    # 稳定信号，可以发现"一个 commit 让某个热点 +50%"这种回归。
    #
    # 策略：
    #  - 仅 PR 触发（push 到 main 不再跑，避免噪声）
    #  - continue-on-error: true 永不阻塞合并；只把 markdown 报告评论到 PR
    #  - 评论用 sticky comment，每次更新同一个评论而非追加
    name: Perf check (soft, PR comment)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run perf-check and generate markdown report
        # 失败也继续（perf:check 在 fail 阈值会 exit 1），让评论步骤照常发
        run: npm run perf:check:report || true
      - name: Verify report exists
        run: |
          if [ ! -f tests/perf-report.md ]; then
            echo "perf-report.md not generated; skipping comment"
            exit 0
          fi
          echo "::group::Perf report preview"
          head -50 tests/perf-report.md
          echo "::endgroup::"
      - name: Sticky comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: perf-check
          path: tests/perf-report.md
      - name: Upload perf report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: tests/perf-report.md
          if-no-files-found: ignore
          retention-days: 90  # II4: perf 趋势对照需长期

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Surface high-severity issues but don't fail the build until we
      # have a green baseline; remove `|| true` to enforce.
      - run: npm audit --omit=dev --audit-level=high || true

  python-smoke:
    name: Python (smoke import)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install root deps
        run: pip install -r requirements.txt
      - name: Import server + enterprise_extensions
        run: python3 -c "import enterprise_extensions; import server; print('ok')"

  spawn-model-gate:
    name: SpawnPolicyNet (drift + θ schema gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install numpy + CPU torch
        # CPU-only wheel keeps the install light; the spawn_model package
        # __init__ imports model_v3 (torch), so torch is required even for
        # the otherwise numpy-only drift logic checks.
        run: |
          pip install numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Drift + explicit-θ logic self-check
        # Validates PSI math, PB-θ normalization, BEHAVIOR_CONTEXT_DIM=61,
        # theta_regime stability, drift_reference build/check, and the
        # constant-column no-false-alarm guard.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m rl_pytorch.spawn_model.test_drift
      - name: SpawnPolicyNet schema/forward self-check
        # Guards the 61-dim behaviorContext contract end-to-end (board_proj
        # = 64 + 61 = 125), AR decode heads, LoRA round-trip, and train
        # helpers. The web<->python dim parity is covered by vitest.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m rl_pytorch.spawn_model.test_v3

  python-services:
    name: Python services (pytest, pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install services deps
        run: |
          pip install -r services/requirements.txt
          pip install pytest pytest-cov pip-audit
      - name: pytest (services)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest services/tests --cov=services --cov-report=xml --cov-report=term
      - name: pip-audit (high+)
        # Tracked vulnerabilities can be silenced with --ignore-vuln; we
        # tolerate failures until a green baseline ships.
        run: pip-audit -r services/requirements.txt --strict || true
      - name: Upload python coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 30  # II4: coverage 短期诊断够用

  alembic-check:
    name: Alembic (migration vs models)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - name: Install services deps
        run: pip install -r services/requirements.txt
      - name: Apply migrations to a clean sqlite
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "sqlite:///services/_alembic_ci.sqlite"
        run: alembic -c services/alembic.ini upgrade head
      - name: Verify autogenerate diff is empty
        # If autogenerate detects schema drift, the new revision file
        # contains real `op.*` calls. Empty pass-through revisions (no
        # actual diff) are deleted before we check.
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: "sqlite:///services/_alembic_ci.sqlite"
        run: |
          alembic -c services/alembic.ini revision --autogenerate -m "ci-drift-check" || true
          for f in services/migrations/versions/*ci_drift_check*.py; do
            if [ -f "$f" ]; then
              if grep -E "^\s*op\." "$f" > /dev/null; then
                echo "Alembic detected schema drift; commit the new revision file:"
                cat "$f"
                exit 1
              fi
              rm "$f"
            fi
          done
          echo "No schema drift."

  docker-compose-config:
    name: docker compose config (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose file syntax
        # Provide stub env values so `${VAR:?}` validation does not block.
        run: |
          export POSTGRES_PASSWORD=ci_postgres_password_placeholder_32chars
          export REDIS_PASSWORD=ci_redis_password_placeholder_32chars
          export ENCRYPTION_KEY=ci_fake_encryption_key_placeholder_44chars
          export JWT_SECRET=ci_fake_jwt_secret_placeholder_64chars_long_enough
          export PAYMENT_SECRET_KEY=ci_payment_secret_placeholder_min32chars
          docker compose -f services/docker-compose.yml config > /dev/null
