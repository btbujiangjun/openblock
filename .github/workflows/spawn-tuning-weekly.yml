name: Spawn Tuning Weekly

# 每周日 02:00 UTC (北京时间 10:00) 自动跑寻参 MVP,
# 输出 SQLite 数据库 + 报告作为 artifact,供人工审查。
# 不自动部署到生产 — 部署需经评审 PR。

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      thetas:
        description: '每 context 的 θ 数 (默认 10, full 模式 97)'
        required: false
        default: '10'
      contexts:
        description: 'Context 过滤 (默认 normal:budget-p2)'
        required: false
        default: 'normal:budget-p2'
      workers:
        description: '并行 worker 数'
        required: false
        default: '4'

permissions:
  contents: read

jobs:
  bench:
    name: Phase C 基础设施基线
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run benchmark (quick mode)
        run: npm run spawn:tune:bench:quick
      - name: Vitest tuning suite
        run: npx vitest run tests/tuning/

  tune:
    name: 周度寻参 (MVP)
    needs: bench
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run spawn-tune-v2 (MVP scale)
        run: |
          node scripts/spawn-tune-v2.mjs \
            --contexts '${{ github.event.inputs.contexts || ''normal:budget-p2'' }}' \
            --thetas ${{ github.event.inputs.thetas || '10' }} \
            --seeds 2 \
            --workers ${{ github.event.inputs.workers || '4' }} \
            --sessions 30 \
            --max-steps 120 \
            --db .cursor-stress-logs/spawn-tuning-ci.sqlite \
            --out .cursor-stress-logs/spawn-tuning-ci.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spawn-tuning-weekly-${{ github.run_id }}
          path: |
            .cursor-stress-logs/spawn-tuning-ci.sqlite
            .cursor-stress-logs/spawn-tuning-ci.json
          retention-days: 30
