apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
  namespace: openblock
  labels:
    app.kubernetes.io/name: game-service
    app.kubernetes.io/part-of: openblock
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels:
      app.kubernetes.io/name: game-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: game-service
        app.kubernetes.io/part-of: openblock
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/openblock/game:1.15.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8002 }
          envFrom:
            - configMapRef: { name: openblock-config }
            - secretRef:    { name: openblock-secrets }
          env:
            - { name: SERVICE_PORT,     value: "8002" }
            - { name: OTEL_SERVICE_NAME, value: "openblock-game" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
  namespace: openblock
spec:
  selector: { app.kubernetes.io/name: game-service }
  ports:
    - { name: http, port: 8002, targetPort: http }
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-service
  namespace: openblock
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: game-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
