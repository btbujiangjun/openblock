#
# Example Secret manifest for the OpenBlock services. DO NOT commit a
# populated copy — generate from your secret manager (External Secrets,
# SealedSecrets, sops-encrypted variants).
#
# Generate values:
#   openssl rand -hex 32                                 # JWT_SECRET, *_PASSWORD, PAYMENT_SECRET_KEY
#   python -c 'import cryptography.fernet as f; print(f.Fernet.generate_key().decode())'  # ENCRYPTION_KEY
#
# Apply (after replacing every PLACEHOLDER):
#   kubectl -n openblock apply -f 10-secret.example.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: openblock-secrets
  namespace: openblock
type: Opaque
stringData:
  POSTGRES_USER:        "openblock"
  POSTGRES_DB:          "openblock"
  POSTGRES_PASSWORD:    "PLACEHOLDER_postgres_password_min32chars"
  REDIS_PASSWORD:       "PLACEHOLDER_redis_password_min32chars"
  ENCRYPTION_KEY:       "PLACEHOLDER_fernet_key_44chars"
  JWT_SECRET:           "PLACEHOLDER_jwt_secret_min32chars"
  PAYMENT_SECRET_KEY:   "PLACEHOLDER_payment_secret_min32chars"
  SENTRY_DSN:           ""
